# ── DocMind — Docker Compose ───────────────────────────────────────────────────
# Services:
#   ollama   — Runs the LLM (phi3:mini) and embedding model (nomic-embed-text)
#   qdrant   — Vector store (persistent, collection stored in a named volume)
#   app      — Streamlit RAG frontend
#
# Usage:
#   docker compose up --build          # first run (pulls images + builds app)
#   docker compose up -d               # detached/background mode
#   docker compose down                # stop everything
#   docker compose down -v             # stop + wipe all volumes (fresh start)

services:

  # ── 1. Ollama LLM + Embedding Server ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: docmind_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"        # expose so you can also use Ollama locally
    volumes:
      - ollama_data:/root/.ollama   # persists downloaded models between restarts
    # Pull required models after the server starts
    # phi3:mini  ~2.3 GB  |  nomic-embed-text ~274 MB
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       sleep 5 &&
       ollama pull phi3:mini &&
       ollama pull nomic-embed-text &&
       wait"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 120s   # allow time for model pulls on first run
      retries: 5

  # ── 2. Qdrant Vector Store ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docmind_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"    # REST API + Web UI  →  http://localhost:6333/dashboard
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage   # persists vector collections
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ── 3. DocMind Streamlit App ─────────────────────────────────────────────────
  app:
    build:
      context: .          # build from the project root (where Dockerfile sits)
      dockerfile: Dockerfile
    container_name: docmind_app
    restart: unless-stopped
    ports:
      - "8501:8501"       # Streamlit UI  →  http://localhost:8501
    volumes:
      - app_uploads:/app/data/uploads      # user-uploaded documents
      - app_embeddings:/app/data/embeddings # embedded/local Qdrant cache
    environment:
      # Point the app to the Ollama container (overrides localhost default)
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: phi3:mini

      # Point to the Qdrant container (leave blank to use embedded local mode)
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  ollama_data:        # Ollama model weights (~2.6 GB on first pull)
  qdrant_data:        # Qdrant vector collections
  app_uploads:        # Uploaded PDF/DOCX/TXT files
  app_embeddings:     # Local embedded Qdrant fallback
